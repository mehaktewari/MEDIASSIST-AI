server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing — any path that isn't a real
    # file (e.g. /query, /doctor-note) should still serve index.html so
    # React Router can take over, otherwise refreshing on those pages
    # would 404 at the Nginx level.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic gzip for faster loads
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}