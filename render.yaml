# Render "Blueprint" — lets you deploy the backend with one click via
# https://dashboard.render.com/blueprints instead of clicking through
# manual service setup. Render reads this file automatically if it's
# at the repo root.
services:
  - type: web
    name: mediassist-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # You must paste your own Gemini key in the Render dashboard after
      # the blueprint deploys — Render blueprints never store secret
      # values in this file or in git.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      # Forced to "gemini" here because Render has no Ollama server running —
      # "auto" would silently try (and fail) to reach a local Ollama instance
      # that doesn't exist on the server.
      - key: LLM_PROVIDER
        value: gemini
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: DEBUG
        value: "false"
      # Set this to your deployed Vercel URL once you have it, e.g.
      # https://mediassist-ai.vercel.app — used to lock down CORS in production.
      - key: FRONTEND_URL
        sync: false
      - key: UPLOAD_DIR
        value: data/uploads
      - key: MAX_FILE_SIZE_MB
        value: "50"